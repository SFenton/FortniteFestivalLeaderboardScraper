server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── Docker embedded DNS resolver ────────────────────────────
    # Required so nginx re-resolves upstream hostnames (fstservice)
    # instead of caching the first-resolved IP forever. Prevents
    # 502 Bad Gateway when the upstream container is recreated and
    # gets a new IP (see memories/repo/festivalweb-nginx-stale-dns-after-recreate).
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── Charset (defence-in-depth for UTF-8 content) ────────────
    charset utf-8;
    charset_types
        text/css
        text/plain
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Gzip compression ────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Hashed static assets (long cache) ───────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Reverse proxy /api to the backend service ───────────────
    # Using a variable in proxy_pass forces nginx to re-resolve via the
    # resolver directive on each request (with caching per `valid=`).
    # Without this, nginx resolves once at startup and caches forever.
    location /api/ {
        set $api_backend ${API_BACKEND_URL};
        proxy_pass $api_backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
        # WebSocket support for /api paths if needed
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Proxy health endpoints ──────────────────────────────────
    location /healthz {
        set $api_backend ${API_BACKEND_URL};
        proxy_pass $api_backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /readyz {
        set $api_backend ${API_BACKEND_URL};
        proxy_pass $api_backend$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── SPA fallback: serve index.html for client-side routes ───
    location / {
        try_files $uri $uri/ /index.html;
    }
}
