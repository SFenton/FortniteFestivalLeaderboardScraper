<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festival Score Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1A0A2E;
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 1.25rem;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.6);
        }

        .accent-bar {
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, #7B2FBE, #9D4EDD);
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="accent-bar"></div>
        <h1>Festival Score Tracker</h1>
        <p>Coming Soon</p>
    </div>
</body>
</html>
