<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Festival Score Tracker icon">
  <defs>
    <linearGradient id="bg" x1="64" y1="32" x2="448" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7C3AED" />
      <stop offset="0.46" stop-color="#4B0F63" />
      <stop offset="1" stop-color="#1A0830" />
    </linearGradient>
    <filter id="badgeShadow" x="-20%" y="-35%" width="140%" height="170%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.36" />
    </filter>
    <filter id="textShadow" x="-20%" y="-30%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <rect width="512" height="512" fill="url(#bg)" />
  <rect width="512" height="512" fill="#000000" opacity="0.08" />

  <g transform="translate(256 256) skewX(-8) translate(-256 -256)" filter="url(#badgeShadow)">
    <rect x="92" y="174" width="328" height="156" rx="10" fill="#332915" fill-opacity="0.34" stroke="#3A2B0A" stroke-width="22" />
    <rect x="92" y="174" width="328" height="156" rx="10" fill="none" stroke="#CFA500" stroke-width="14" />
    <text x="256" y="298" text-anchor="middle" font-family="Liberation Sans Narrow, Arial Black, Arial, sans-serif" font-size="140" font-weight="900" font-style="italic" fill="#FFD700" stroke="#3A2B0A" stroke-width="5" paint-order="stroke fill" filter="url(#textShadow)">FST</text>
  </g>
</svg>
