name: Publish Docker Image

on:
  push:
    branches: [master]
    paths:
      - "FSTService/**"
      - "FortniteFestival.Core/**"
      - "FSTService.Tests/**"
      - "FSTService/Dockerfile"
      - "FortniteFestivalWeb/**"
      - "FortniteFestivalRN/**"
      - "packages/**"
      - ".github/workflows/publish-image.yml"
  pull_request:
    branches: [master]
    paths:
      - "FSTService/**"
      - "FortniteFestival.Core/**"
      - "FSTService.Tests/**"
      - "FortniteFestivalWeb/**"
      - "FortniteFestivalRN/**"
      - "packages/**"
      - ".github/workflows/publish-image.yml"
  workflow_dispatch: # Allow manual trigger

env:
  REGISTRY: ghcr.io
  FST_IMAGE_NAME: ${{ github.repository_owner }}/fstservice
  WEB_IMAGE_NAME: ${{ github.repository_owner }}/fstfestivalweb

jobs:
  version-bump:
    runs-on: ubuntu-latest
    # Only bump versions on push to master; skip if this push was itself a version bump
    if: >
      github.event_name == 'push' &&
      !contains(github.event.head_commit.message, '[version-bump]')

    outputs:
      bumped: ${{ steps.commit.outputs.bumped }}

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect changed components
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          echo "service=false" >> "$GITHUB_OUTPUT"
          echo "web=false" >> "$GITHUB_OUTPUT"
          echo "mobile=false" >> "$GITHUB_OUTPUT"
          echo "core_ts=false" >> "$GITHUB_OUTPUT"
          echo "theme_ts=false" >> "$GITHUB_OUTPUT"

          if echo "$CHANGED" | grep -qE '^(FSTService/|FortniteFestival\.Core/)'; then
            echo "service=true" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | grep -qE '^FortniteFestivalWeb/'; then
            echo "web=true" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | grep -qE '^FortniteFestivalRN/'; then
            echo "mobile=true" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | grep -qE '^packages/core/'; then
            echo "core_ts=true" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | grep -qE '^packages/theme/'; then
            echo "theme_ts=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.changes.outputs.web == 'true' || steps.changes.outputs.mobile == 'true' || steps.changes.outputs.core_ts == 'true' || steps.changes.outputs.theme_ts == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Bump FSTService version
        if: steps.changes.outputs.service == 'true'
        run: |
          CSPROJ="FSTService/FSTService.csproj"
          CURRENT=$(sed -n 's/.*<Version>\(.*\)<\/Version>.*/\1/p' "$CSPROJ")
          if [ -z "$CURRENT" ]; then
            echo "No <Version> found in $CSPROJ, skipping"
            exit 0
          fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          sed -i "s|<Version>$CURRENT</Version>|<Version>$NEW_VERSION</Version>|" "$CSPROJ"
          echo "FSTService: $CURRENT -> $NEW_VERSION"

      - name: Bump FortniteFestivalWeb version
        if: steps.changes.outputs.web == 'true'
        run: |
          cd FortniteFestivalWeb
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "FortniteFestivalWeb: $CURRENT -> $NEW_VERSION"

      - name: Bump FortniteFestivalRN version
        if: steps.changes.outputs.mobile == 'true'
        run: |
          cd FortniteFestivalRN
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "FortniteFestivalRN: $CURRENT -> $NEW_VERSION"

      - name: Bump @festival/core version
        if: steps.changes.outputs.core_ts == 'true'
        run: |
          cd packages/core
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "@festival/core: $CURRENT -> $NEW_VERSION"

      - name: Bump @festival/theme version
        if: steps.changes.outputs.theme_ts == 'true'
        run: |
          cd packages/theme
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "@festival/theme: $CURRENT -> $NEW_VERSION"

      - name: Sync APP_VERSION constant in @festival/core
        if: steps.changes.outputs.mobile == 'true'
        run: |
          NEW_VERSION=$(node -p "require('./FortniteFestivalRN/package.json').version")
          sed -i "s|export const APP_VERSION = '.*';|export const APP_VERSION = '$NEW_VERSION';|" packages/core/src/index.ts
          echo "Updated APP_VERSION in @festival/core to $NEW_VERSION"

      - name: Sync CORE_VERSION constant in @festival/core
        if: steps.changes.outputs.core_ts == 'true'
        run: |
          NEW_VERSION=$(node -p "require('./packages/core/package.json').version")
          sed -i "s|export const CORE_VERSION = '.*';|export const CORE_VERSION = '$NEW_VERSION';|" packages/core/src/index.ts
          echo "Updated CORE_VERSION in @festival/core to $NEW_VERSION"

      - name: Sync THEME_VERSION constant in @festival/core
        if: steps.changes.outputs.theme_ts == 'true'
        run: |
          NEW_VERSION=$(node -p "require('./packages/theme/package.json').version")
          sed -i "s|export const THEME_VERSION = '.*';|export const THEME_VERSION = '$NEW_VERSION';|" packages/core/src/index.ts
          echo "Updated THEME_VERSION in @festival/core to $NEW_VERSION"

      - name: Commit version bumps
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No version changes to commit"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: auto version bump [version-bump]"
            git push
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: [version-bump]
    # Run even when version-bump is skipped (PRs, workflow_dispatch, version-bump commits)
    if: ${{ !failure() && !cancelled() }}
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore FSTService.Tests/FSTService.Tests.csproj

      - name: Build
        run: dotnet build FSTService.Tests/FSTService.Tests.csproj -c Release --no-restore

      - name: Run tests with coverage
        run: >
          dotnet test FSTService.Tests/FSTService.Tests.csproj
          -c Release --no-build
          --logger trx --results-directory TestResults
          --collect:"XPlat Code Coverage"
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[FSTService]*"

      - name: Enforce minimum line coverage for FSTService
        shell: bash
        env:
          COVERAGE_THRESHOLD: 94
        run: |
          REPORT=$(find TestResults -name 'coverage.cobertura.xml' | head -1)
          if [ -z "$REPORT" ]; then
            echo "::error::No coverage report found"
            exit 1
          fi

          # Extract line-rate for the FSTService package specifically.
          # The Cobertura XML has <package name="FSTService" line-rate="0.xx" ...>.
          # We use sed (not grep -P) to avoid variable-length lookbehind issues.
          LINE_RATE=$(sed -n 's/.*<package[^>]*name="FSTService"[^>]*line-rate="\([^"]*\)".*/\1/p' "$REPORT" | head -1)

          # Fallback: if no FSTService-specific package found, use the top-level rate
          if [ -z "$LINE_RATE" ]; then
            LINE_RATE=$(sed -n 's/.*<coverage[^>]*line-rate="\([^"]*\)".*/\1/p' "$REPORT" | head -1)
          fi

          if [ -z "$LINE_RATE" ]; then
            echo "::error::Could not parse line-rate from coverage report"
            exit 1
          fi

          PERCENT=$(echo "$LINE_RATE * 100" | bc -l)
          PERCENT_FMT=$(printf "%.2f" "$PERCENT")
          echo "FSTService line coverage: ${PERCENT_FMT}%"

          PASS=$(echo "$PERCENT >= $COVERAGE_THRESHOLD" | bc -l)
          if [ "$PASS" -ne 1 ]; then
            echo "::error::Coverage ${PERCENT_FMT}% is below the ${COVERAGE_THRESHOLD}% threshold"
            exit 1
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            TestResults/*.trx
            TestResults/**/coverage.cobertura.xml

  # TODO: Re-enable test-web once web project is stable
  # test-web:
  #   needs: [version-bump]
  #   if: ${{ !failure() && !cancelled() }}
  #   runs-on: ubuntu-latest
  #
  #   steps:
  #     - name: Checkout
  #       uses: actions/checkout@v4
  #
  #     - name: Setup Node.js
  #       uses: actions/setup-node@v4
  #       with:
  #         node-version: "20"
  #
  #     - name: Enable Corepack
  #       run: corepack enable
  #
  #     - name: Install dependencies
  #       working-directory: FortniteFestivalWeb
  #       run: yarn install --immutable
  #
  #     - name: Build
  #       working-directory: FortniteFestivalWeb
  #       run: yarn vite build --outDir dist
  #
  #     - name: Run tests with coverage
  #       working-directory: FortniteFestivalWeb
  #       run: yarn vitest run --coverage

  build-and-push-service:
    needs: [version-bump]
    # Run on push/dispatch when version-bump either didn't run or didn't push a new commit.
    # When version-bump IS skipped (e.g. [version-bump] commit triggers Run 2), this still runs.
    if: |-
      always()
      && !failure() && !cancelled()
      && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && needs.version-bump.outputs.bumped != 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract FSTService metadata
        id: meta-fst
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FST_IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push FSTService
        uses: docker/build-push-action@v6
        with:
          context: .
          file: FSTService/Dockerfile
          push: true
          tags: ${{ steps.meta-fst.outputs.tags }}
          labels: ${{ steps.meta-fst.outputs.labels }}

  build-and-push-web:
    needs: [version-bump]
    # Run on push/dispatch when version-bump either didn't run or didn't push a new commit.
    # When version-bump IS skipped (e.g. [version-bump] commit triggers Run 2), this still runs.
    if: |-
      always()
      && !failure() && !cancelled()
      && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && needs.version-bump.outputs.bumped != 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract FestivalWeb metadata
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push FestivalWeb
        uses: docker/build-push-action@v6
        with:
          context: .
          file: FortniteFestivalWeb/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
