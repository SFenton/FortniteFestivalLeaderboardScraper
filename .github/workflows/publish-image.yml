name: Publish Docker Image

on:
  push:
    branches: [master]
    paths:
      - "FSTService/**"
      - "FortniteFestival.Core/**"
      - "FSTService.Tests/**"
      - "FSTService/Dockerfile"
      - ".github/workflows/publish-image.yml"
  pull_request:
    branches: [master]
    paths:
      - "FSTService/**"
      - "FortniteFestival.Core/**"
      - "FSTService.Tests/**"
      - ".github/workflows/publish-image.yml"
  workflow_dispatch: # Allow manual trigger

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/fstservice

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore FSTService.Tests/FSTService.Tests.csproj

      - name: Build
        run: dotnet build FSTService.Tests/FSTService.Tests.csproj -c Release --no-restore

      - name: Run tests with coverage
        run: >
          dotnet test FSTService.Tests/FSTService.Tests.csproj
          -c Release --no-build
          --logger trx --results-directory TestResults
          --collect:"XPlat Code Coverage"
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[FSTService]*"

      - name: Enforce minimum line coverage for FSTService
        shell: bash
        env:
          COVERAGE_THRESHOLD: 85
        run: |
          REPORT=$(find TestResults -name 'coverage.cobertura.xml' | head -1)
          if [ -z "$REPORT" ]; then
            echo "::error::No coverage report found"
            exit 1
          fi

          # Extract line-rate for the FSTService package specifically.
          # The Cobertura XML has <package name="FSTService" line-rate="0.xx" ...>.
          # We use sed (not grep -P) to avoid variable-length lookbehind issues.
          LINE_RATE=$(sed -n 's/.*<package[^>]*name="FSTService"[^>]*line-rate="\([^"]*\)".*/\1/p' "$REPORT" | head -1)

          # Fallback: if no FSTService-specific package found, use the top-level rate
          if [ -z "$LINE_RATE" ]; then
            LINE_RATE=$(sed -n 's/.*<coverage[^>]*line-rate="\([^"]*\)".*/\1/p' "$REPORT" | head -1)
          fi

          if [ -z "$LINE_RATE" ]; then
            echo "::error::Could not parse line-rate from coverage report"
            exit 1
          fi

          PERCENT=$(echo "$LINE_RATE * 100" | bc -l)
          PERCENT_FMT=$(printf "%.2f" "$PERCENT")
          echo "FSTService line coverage: ${PERCENT_FMT}%"

          PASS=$(echo "$PERCENT >= $COVERAGE_THRESHOLD" | bc -l)
          if [ "$PASS" -ne 1 ]; then
            echo "::error::Coverage ${PERCENT_FMT}% is below the ${COVERAGE_THRESHOLD}% threshold"
            exit 1
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            TestResults/*.trx
            TestResults/**/coverage.cobertura.xml

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: FSTService/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
