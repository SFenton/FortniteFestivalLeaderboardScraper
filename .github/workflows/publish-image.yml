name: Publish Docker Image

on:
  push:
    branches: [master]
    paths:
      - "FSTService/**"
      - "FortniteFestival.Core/**"
      - "FSTService.Tests/**"
      - "FSTService/Dockerfile"
      - "FortniteFestivalWeb/**"
      - "packages/**"
      - "PercentileService/**"
      - "PercentileService.Tests/**"
      - "PercentileService/Dockerfile"
      - ".github/workflows/publish-image.yml"
  pull_request:
    branches: [master]
    paths:
      - "FSTService/**"
      - "FortniteFestival.Core/**"
      - "FSTService.Tests/**"
      - "FortniteFestivalWeb/**"
      - "packages/**"
      - "PercentileService/**"
      - "PercentileService.Tests/**"
      - ".github/workflows/publish-image.yml"
  workflow_dispatch: # Allow manual trigger

env:
  REGISTRY: ghcr.io
  FST_IMAGE_NAME: ${{ github.repository_owner }}/fstservice
  PERCENTILE_IMAGE_NAME: ${{ github.repository_owner }}/percentileservice

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore FSTService.Tests/FSTService.Tests.csproj

      - name: Build
        run: dotnet build FSTService.Tests/FSTService.Tests.csproj -c Release --no-restore

      - name: Run tests with coverage
        run: >
          dotnet test FSTService.Tests/FSTService.Tests.csproj
          -c Release --no-build
          --logger trx --results-directory TestResults
          --collect:"XPlat Code Coverage"
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[FSTService]*"

      - name: Enforce minimum line coverage for FSTService
        shell: bash
        env:
          COVERAGE_THRESHOLD: 93.9
        run: |
          REPORT=$(find TestResults -name 'coverage.cobertura.xml' | head -1)
          if [ -z "$REPORT" ]; then
            echo "::error::No coverage report found"
            exit 1
          fi

          # Extract line-rate for the FSTService package specifically.
          # The Cobertura XML has <package name="FSTService" line-rate="0.xx" ...>.
          # We use sed (not grep -P) to avoid variable-length lookbehind issues.
          LINE_RATE=$(sed -n 's/.*<package[^>]*name="FSTService"[^>]*line-rate="\([^"]*\)".*/\1/p' "$REPORT" | head -1)

          # Fallback: if no FSTService-specific package found, use the top-level rate
          if [ -z "$LINE_RATE" ]; then
            LINE_RATE=$(sed -n 's/.*<coverage[^>]*line-rate="\([^"]*\)".*/\1/p' "$REPORT" | head -1)
          fi

          if [ -z "$LINE_RATE" ]; then
            echo "::error::Could not parse line-rate from coverage report"
            exit 1
          fi

          PERCENT=$(echo "$LINE_RATE * 100" | bc -l)
          PERCENT_FMT=$(printf "%.2f" "$PERCENT")
          echo "FSTService line coverage: ${PERCENT_FMT}%"

          PASS=$(echo "$PERCENT >= $COVERAGE_THRESHOLD" | bc -l)
          if [ "$PASS" -ne 1 ]; then
            echo "::error::Coverage ${PERCENT_FMT}% is below the ${COVERAGE_THRESHOLD}% threshold"
            exit 1
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            TestResults/*.trx
            TestResults/**/coverage.cobertura.xml

  test-percentile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore PercentileService.Tests/PercentileService.Tests.csproj

      - name: Build
        run: dotnet build PercentileService.Tests/PercentileService.Tests.csproj -c Release --no-restore

      - name: Run tests with coverage
        run: >
          dotnet test PercentileService.Tests/PercentileService.Tests.csproj
          -c Release --no-build
          --logger trx --results-directory TestResults-Percentile
          --collect:"XPlat Code Coverage"
          -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[PercentileService]*"
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude="[PercentileService.Tests]*"

      - name: Enforce minimum line coverage for PercentileService
        shell: bash
        env:
          COVERAGE_THRESHOLD: 95
        run: |
          REPORT=$(find TestResults-Percentile -name 'coverage.cobertura.xml' | head -1)
          if [ -z "$REPORT" ]; then
            echo "::error::No coverage report found"
            exit 1
          fi

          LINE_RATE=$(sed -n 's/.*<package[^>]*name="PercentileService"[^>]*line-rate="\([^"]*\)".*/\1/p' "$REPORT" | head -1)

          if [ -z "$LINE_RATE" ]; then
            LINE_RATE=$(sed -n 's/.*<coverage[^>]*line-rate="\([^"]*\)".*/\1/p' "$REPORT" | head -1)
          fi

          if [ -z "$LINE_RATE" ]; then
            echo "::error::Could not parse line-rate from coverage report"
            exit 1
          fi

          PERCENT=$(echo "$LINE_RATE * 100" | bc -l)
          PERCENT_FMT=$(printf "%.2f" "$PERCENT")
          echo "PercentileService line coverage: ${PERCENT_FMT}%"

          PASS=$(echo "$PERCENT >= $COVERAGE_THRESHOLD" | bc -l)
          if [ "$PASS" -ne 1 ]; then
            echo "::error::Coverage ${PERCENT_FMT}% is below the ${COVERAGE_THRESHOLD}% threshold"
            exit 1
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-percentile
          path: |
            TestResults-Percentile/*.trx
            TestResults-Percentile/**/coverage.cobertura.xml

