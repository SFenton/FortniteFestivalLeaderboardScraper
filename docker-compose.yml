services:
  fstservice:
    build:
      context: .
      dockerfile: FSTService/Dockerfile
    container_name: fstservice
    restart: unless-stopped
    volumes:
      - ./fst-data:/app/data
    # Bind to localhost only — not exposed to the network.
    # For external access, use a reverse proxy (see design doc).
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - DOTNET_ENVIRONMENT=Production
      # ── Required secrets (override defaults from appsettings.json) ──
      # Generate with: openssl rand -hex 32
      - Jwt__Secret=${JWT_SECRET:?Set JWT_SECRET in .env}
      - EpicOAuth__ClientSecret=${EPIC_CLIENT_SECRET:?Set EPIC_CLIENT_SECRET in .env}
      - EpicOAuth__TokenEncryptionKey=${TOKEN_ENCRYPTION_KEY:?Set TOKEN_ENCRYPTION_KEY in .env}
      - Api__ApiKey=${API_KEY:?Set API_KEY in .env}
      # Override scraper settings via environment variables if needed:
      # - Scraper__ScrapeInterval=04:00:00
      # - Scraper__SongSyncInterval=00:15:00
      # - Scraper__DegreeOfParallelism=16
    # Healthcheck (ready for future /healthz endpoint)
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
    #   interval: 30s
    #   timeout: 5s
    #   retries: 3
    #   start_period: 30s
