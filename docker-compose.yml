services:
  postgres:
    image: fst-postgres:17-repack
    build:
      context: ./deploy
      dockerfile: postgres.Dockerfile
    container_name: fst-postgres
    restart: unless-stopped
    volumes:
      - ${POSTGRES_DATA_DIR:-./pg-data}:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=fstservice
      - POSTGRES_USER=fst
      - POSTGRES_PASSWORD=${PG_PASSWORD:-fst_dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fst -d fstservice"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  fstservice:
    build: &fstservice_build
      context: .
      dockerfile: FSTService/Dockerfile
    container_name: fstservice
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes: &fstservice_volumes
      - ${FST_DATA_DIR:-./fst-data}:/app/data
    # API frontend only: serves requests plus lightweight song/path refresh.
    # Scrape, ranking, and band-history mutation workers belong to fstworker.
    command: ["--no-scraper-worker"]
    # Bind to localhost only — not exposed to the network.
    # For external access, use a reverse proxy (see design doc).
    ports:
      - "127.0.0.1:8080:8080"
    environment: &fstservice_environment
      - DOTNET_ENVIRONMENT=Production
      # ── Database ──
      - ConnectionStrings__PostgreSQL=Host=postgres;Port=5432;Database=fstservice;Username=fst;Password=${PG_PASSWORD:-fst_dev};Minimum Pool Size=2;Maximum Pool Size=15;Connection Idle Lifetime=30;Connection Pruning Interval=10;Command Timeout=0
      # ── Required secrets (override defaults from appsettings.json) ──
      # Generate with: openssl rand -hex 32
      - Api__ApiKey=${API_KEY:?Set API_KEY in .env}
      - WebApp__Username=${WEBAPP_USERNAME:-admin}
      - WebApp__Password=${WEBAPP_PASSWORD:-changeme}
      # ── Path generation (MIDI decryption key for CHOpt max score calculation) ──
      - Scraper__MidiEncryptionKey=${MIDI_ENCRYPTION_KEY:-}
      - Scraper__SongMachineDop=${SONG_MACHINE_DOP:-10}
      - Scraper__DegreeOfParallelism=${SCRAPER_DOP:-64}
      - Scraper__DisableScraperWorker=${SCRAPER_DISABLE_SCRAPER_WORKER:-false}
      - Scraper__RankHistorySnapshotMaxDegreeOfParallelism=${RANK_HISTORY_SNAPSHOT_MAX_DOP:-1}
      - Scraper__WebRegistrationRetentionDays=${WEB_REGISTRATION_RETENTION_DAYS:-7}
      - BandRankHistory__Mode=${BAND_RANK_HISTORY_MODE:-Background}
      - BandRankHistory__WriteMode=${BAND_RANK_HISTORY_WRITE_MODE:-V2Only}
      - BandRankHistory__ApiReadSource=${BAND_RANK_HISTORY_API_READ_SOURCE:-V2NarrowOnly}
      - BandRankHistory__UseWideHistoryCompatibilityWrite=${BAND_RANK_HISTORY_USE_WIDE_HISTORY_COMPATIBILITY_WRITE:-false}
      - BandRankHistory__ChunkSize=${BAND_RANK_HISTORY_CHUNK_SIZE:-250000}
      - BandRankHistory__RangeChunkingEnabled=${BAND_RANK_HISTORY_RANGE_CHUNKING_ENABLED:-true}
      - BandRankHistory__CommandTimeoutSeconds=${BAND_RANK_HISTORY_COMMAND_TIMEOUT_SECONDS:-0}
      - BandRankHistory__MaxRetryAttempts=${BAND_RANK_HISTORY_MAX_RETRY_ATTEMPTS:-3}
      - BandRankHistory__RetryDelaySeconds=${BAND_RANK_HISTORY_RETRY_DELAY_SECONDS:-900}
      - BandRankHistory__StaleRunningJobMinutes=${BAND_RANK_HISTORY_STALE_RUNNING_JOB_MINUTES:-15}
      # ── Feature flags (default: all OFF in production) ──
      - Features__Shop=${FEATURE_SHOP:-false}
      - Features__Rivals=${FEATURE_RIVALS:-false}
      - Features__Leaderboards=${FEATURE_LEADERBOARDS:-false}
      - Features__FirstRun=${FEATURE_FIRST_RUN:-false}
      - Features__AppManual=${FEATURE_APP_MANUAL:-false}
      - ImprovementNotifications__Enabled=${IMPROVEMENT_NOTIFICATIONS_ENABLED:-true}
      - ImprovementNotifications__Scope=${IMPROVEMENT_NOTIFICATIONS_SCOPE:-registered}
      # Override scraper settings via environment variables if needed:
      # - Scraper__ScrapeInterval=04:00:00
      # - Scraper__SongSyncInterval=00:15:00
      # - Scraper__DegreeOfParallelism=16
      # - Scraper__MaxRequestsPerSecond=600
      # ── Proxy rotation (round-robin across multiple HTTP proxies) ──
      # - Scraper__ProxyUrls__0=http://gluetun-1:8888
      # - Scraper__ProxyUrls__1=http://gluetun-2:8888
      # - Scraper__ProxyUrls__2=http://gluetun-3:8888
      # - Scraper__ProxyUrls__3=http://gluetun-4:8888
      # ── VPN city cycling (Gluetun control API for IP rotation on CDN blocks) ──
      # - Scraper__ControlUrls__0=http://gluetun-1:8000
      # - Scraper__ControlUrls__1=http://gluetun-2:8000
      # - Scraper__ControlUrls__2=http://gluetun-3:8000
      # - Scraper__ControlUrls__3=http://gluetun-4:8000
      # ── Container names for Docker-based VPN recycling ──
      # - Scraper__ContainerNames__0=gluetun-1
      # - Scraper__ContainerNames__1=gluetun-2
      # - Scraper__ContainerNames__2=gluetun-3
      # - Scraper__ContainerNames__3=gluetun-4
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  fstworker:
    build: *fstservice_build
    container_name: fstworker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      fstservice:
        condition: service_healthy
    volumes: *fstservice_volumes
    environment: *fstservice_environment
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  festivalweb:
    build:
      context: .
      dockerfile: FortniteFestivalWeb/Dockerfile
    container_name: festivalweb
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    environment:
      - API_BACKEND_URL=http://fstservice:8080
    depends_on:
      fstservice:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
