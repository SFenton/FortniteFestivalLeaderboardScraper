      - WIREGUARD_PRESHARED_KEY=${GLUETUN_3_WG_PRESHARED_KEY}
      - WIREGUARD_ADDRESSES=${GLUETUN_3_WG_ADDRESS}
      - WIREGUARD_PUBLIC_KEY=${AIRVPN_WG_PUBLIC_KEY:-PyLCXAQT8KkM4T+dUsOQfn+Ub3pGxfGlxkIApuig+hk=}
      - SERVER_CITIES=${GLUETUN_3_CITY:-London}
      - WIREGUARD_MTU=1320
