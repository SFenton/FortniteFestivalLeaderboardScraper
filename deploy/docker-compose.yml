# docker-compose.yml for the remote Docker host machine.
# Place this file (and optionally a .env with overrides) on the host.
#
# First-time setup:
#   1. Create a GitHub PAT with read:packages scope.
#   2. echo YOUR_PAT | docker login ghcr.io -u SFenton --password-stdin
#
# Usage:
#   docker compose pull
#   docker compose up -d

services:
  postgres:
    image: postgres:17-alpine
    container_name: fst-postgres
    restart: unless-stopped
    volumes:
      - pg-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=fstservice
      - POSTGRES_USER=fst
      - POSTGRES_PASSWORD=${PG_PASSWORD:?Set PG_PASSWORD in .env}
    shm_size: 512mb
    command:
      - "postgres"
      - "-c" 
      - "shared_buffers=2GB"
      - "-c"
      - "work_mem=64MB"
      - "-c"
      - "maintenance_work_mem=512MB"
      - "-c"
      - "effective_cache_size=4GB"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fst -d fstservice"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 4G

  fstservice:
    image: ghcr.io/sfenton/fstservice:latest
    container_name: fstservice
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./fst-data:/app/data
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - DOTNET_ENVIRONMENT=Production
      # ── Database ──
      - DatabaseProvider=PostgreSQL
      - ConnectionStrings__PostgreSQL=Host=postgres;Port=5432;Database=fstservice;Username=fst;Password=${PG_PASSWORD:?Set PG_PASSWORD in .env};Minimum Pool Size=5;Maximum Pool Size=50;Connection Idle Lifetime=300;Command Timeout=30
      # ── Required secrets (override defaults from appsettings.json) ──
      # Generate with: openssl rand -hex 32
      - Api__ApiKey=${API_KEY:?Set API_KEY in .env}
      # ── Epic Games OAuth client (override built-in Switch client if needed) ──
      - EPIC_CLIENT_ID=${EPIC_CLIENT_ID:-}
      - EPIC_CLIENT_SECRET=${EPIC_CLIENT_SECRET:-}
      # ── Leaderboard page cap (100 entries/page, default 100 pages = top 10K) ──
      - Scraper__MaxPagesPerLeaderboard=${MAX_PAGES_PER_LEADERBOARD:-100}
      # ── Sequential scrape: one song at a time, ~6×PageConcurrency concurrent requests (default: false) ──
      - Scraper__SequentialScrape=${SEQUENTIAL_SCRAPE:-false}
      # ── Pages fetched concurrently per instrument in sequential mode (default: 10 = ~60 concurrent) ──
      - Scraper__PageConcurrency=${PAGE_CONCURRENCY:-10}
      # ── Songs scraped concurrently in sequential mode (default: 1) ──
      - Scraper__SongConcurrency=${SONG_CONCURRENCY:-1}
      # ── Hard cap on API requests per second, 0 = unlimited (default: 0) ──
      - Scraper__MaxRequestsPerSecond=${MAX_REQUESTS_PER_SECOND:-0}
      # ── Path generation (MIDI decryption key for CHOpt max score calculation) ──
      - Scraper__MidiEncryptionKey=${MIDI_ENCRYPTION_KEY:-}
      # ── Feature flags (default: all OFF in production) ──
      - Features__Shop=${FEATURE_SHOP:-false}
      - Features__Rivals=${FEATURE_RIVALS:-false}
      - Features__Leaderboards=${FEATURE_LEADERBOARDS:-false}
      - Features__FirstRun=${FEATURE_FIRST_RUN:-false}
      # Set to true to disable background scraping (API-only mode)
      # - Scraper__ApiOnly=true
      # Override scraper settings via environment variables if needed:
      # - Scraper__ScrapeInterval=04:00:00
      # - Scraper__SongSyncInterval=00:15:00
      # - Scraper__DegreeOfParallelism=16
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  pg-data:
