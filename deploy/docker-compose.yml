# docker-compose.yml for the remote Docker host machine.
# Place this file (and optionally a .env with overrides) on the host.
#
# First-time setup:
#   1. Create a GitHub PAT with read:packages scope.
#   2. echo YOUR_PAT | docker login ghcr.io -u SFenton --password-stdin
#
# Usage:
#   docker compose pull
#   docker compose up -d

services:
  fstservice:
    image: ghcr.io/sfenton/fstservice:latest
    container_name: fstservice
    restart: unless-stopped
    volumes:
      - ./fst-data:/app/data
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - DOTNET_ENVIRONMENT=Production
      # ‚îÄ‚îÄ Required secrets (override defaults from appsettings.json) ‚îÄ‚îÄ
      # Generate with: openssl rand -hex 32
      - Api__ApiKey=${API_KEY:?Set API_KEY in .env}
      # ‚îÄ‚îÄ Epic Games OAuth client (override built-in Switch client if needed) ‚îÄ‚îÄ
      - EPIC_CLIENT_ID=${EPIC_CLIENT_ID:-}
      - EPIC_CLIENT_SECRET=${EPIC_CLIENT_SECRET:-}
      # ‚îÄ‚îÄ Leaderboard page cap (100 entries/page, default 100 pages = top 10K) ‚îÄ‚îÄ
      - Scraper__MaxPagesPerLeaderboard=${MAX_PAGES_PER_LEADERBOARD:-100}
      # ‚îÄ‚îÄ Sequential scrape: one song at a time, ~6√óPageConcurrency concurrent requests (default: false) ‚îÄ‚îÄ
      - Scraper__SequentialScrape=${SEQUENTIAL_SCRAPE:-false}
      # ‚îÄ‚îÄ Pages fetched concurrently per instrument in sequential mode (default: 10 = ~60 concurrent) ‚îÄ‚îÄ
      - Scraper__PageConcurrency=${PAGE_CONCURRENCY:-10}
      # ‚îÄ‚îÄ Songs scraped concurrently in sequential mode (default: 1) ‚îÄ‚îÄ
      - Scraper__SongConcurrency=${SONG_CONCURRENCY:-1}
      # ‚îÄ‚îÄ Hard cap on API requests per second, 0 = unlimited (default: 0) ‚îÄ‚îÄ
      - Scraper__MaxRequestsPerSecond=${MAX_REQUESTS_PER_SECOND:-0}
      # ‚îÄ‚îÄ Path generation (MIDI decryption key for CHOpt max score calculation) ‚îÄ‚îÄ
      - Scraper__MidiEncryptionKey=${MIDI_ENCRYPTION_KEY:-}
      # ‚îÄ‚îÄ Feature flags (default: all OFF in production) ‚îÄ‚îÄ
      - Features__Shop=${FEATURE_SHOP:-false}
      - Features__Rivals=${FEATURE_RIVALS:-false}
      - Features__Leaderboards=${FEATURE_LEADERBOARDS:-false}
      - Features__FirstRun=${FEATURE_FIRST_RUN:-false}
      # Set to true to disable background scraping (API-only mode)
      # - Scraper__ApiOnly=true
      # Override scraper settings via environment variables if needed:
      # - Scraper__ScrapeInterval=04:00:00
      # - Scraper__SongSyncInterval=00:15:00
      # - Scraper__DegreeOfParallelism=16
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s


