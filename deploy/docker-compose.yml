# docker-compose.yml for the remote Docker host machine.
# Place this file (and optionally a .env with overrides) on the host.
#
# First-time setup:
#   1. Create a GitHub PAT with read:packages scope.
#   2. echo YOUR_PAT | docker login ghcr.io -u SFenton --password-stdin
#
# Usage:
#   docker compose pull
#   docker compose up -d

services:
  fstservice:
    image: ghcr.io/sfenton/fstservice:latest
    container_name: fstservice
    restart: unless-stopped
    volumes:
      - ./fst-data:/app/data
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - DOTNET_ENVIRONMENT=Production
      # ── Required secrets (override defaults from appsettings.json) ──
      # Generate with: openssl rand -hex 32
      - Jwt__Secret=${JWT_SECRET:?Set JWT_SECRET in .env}
      - EpicOAuth__ClientSecret=${EPIC_CLIENT_SECRET:?Set EPIC_CLIENT_SECRET in .env}
      - EpicOAuth__TokenEncryptionKey=${TOKEN_ENCRYPTION_KEY:?Set TOKEN_ENCRYPTION_KEY in .env}
      - Api__ApiKey=${API_KEY:?Set API_KEY in .env}
      # Set to true to disable background scraping (API-only mode)
      # - Scraper__ApiOnly=true
      # Override scraper settings via environment variables if needed:
      # - Scraper__ScrapeInterval=04:00:00
      # - Scraper__SongSyncInterval=00:15:00
      # - Scraper__DegreeOfParallelism=16

  percentileservice:
    image: ghcr.io/sfenton/percentileservice:latest
    container_name: percentileservice
    restart: unless-stopped
    volumes:
      - ./percentile-data:/app/data
    environment:
      - DOTNET_ENVIRONMENT=Production
      - Percentile__FstBaseUrl=http://fstservice:8080
      - Percentile__FstApiKey=${API_KEY:?Set API_KEY in .env}
      - Percentile__AccountId=${PERCENTILE_ACCOUNT_ID:-195e93ef108143b2975ee46662d4d0e1}
      # Override schedule if needed:
      # - Percentile__ScrapeTimeOfDay=03:30
      # - Percentile__ScrapeTimeZone=America/Los_Angeles
      # - Percentile__DegreeOfParallelism=8
    depends_on:
      - fstservice
