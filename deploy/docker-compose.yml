# docker-compose.yml for the remote Docker host machine.
# Place this file (and optionally a .env with overrides) on the host.
#
# First-time setup:
#   1. Create a GitHub PAT with read:packages scope.
#   2. echo YOUR_PAT | docker login ghcr.io -u SFenton --password-stdin
#
# Usage:
#   docker compose pull
#   docker compose up -d

services:
  postgres:
    image: postgres:17-alpine
    container_name: fst-postgres
    restart: unless-stopped
    volumes:
      - pg-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=fstservice
      - POSTGRES_USER=fst
      - POSTGRES_PASSWORD=${PG_PASSWORD:?Set PG_PASSWORD in .env}
    shm_size: 256mb
    command:
      - "postgres"
      - "-c" 
      - "shared_buffers=1GB"
      - "-c"
      - "work_mem=64MB"
      - "-c"
      - "maintenance_work_mem=256MB"
      - "-c"
      - "effective_cache_size=4GB"
      - "-c"
      - "max_wal_size=4GB"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "idle_in_transaction_session_timeout=60000"
      - "-c"
      - "jit=off"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fst -d fstservice"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 4G

  fstservice:
    image: ghcr.io/sfenton/fstservice:latest
    container_name: fstservice
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./fst-data:/app/data
      # Docker socket for container recycling — allows FSTService to recreate
      # gluetun containers on CDN blocks instead of using the gluetun control API.
      - /var/run/docker.sock:/var/run/docker.sock
    # Grant the non-root 'ubuntu' user access to the Docker socket.
    # Set DOCKER_GID to your host's docker group ID (run: getent group docker | cut -d: -f3).
    group_add:
      - "${DOCKER_GID:-999}"
    # API-only service — the web frontend is served by the festivalweb container.
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      - DOTNET_ENVIRONMENT=Production
      # ── Database ──
      - ConnectionStrings__PostgreSQL=Host=postgres;Port=5432;Database=fstservice;Username=fst;Password=${PG_PASSWORD:?Set PG_PASSWORD in .env};Minimum Pool Size=2;Maximum Pool Size=15;Connection Idle Lifetime=30;Connection Pruning Interval=10;Command Timeout=0
      # ── Required secrets (override defaults from appsettings.json) ──
      # Generate with: openssl rand -hex 32
      - Api__ApiKey=${API_KEY:?Set API_KEY in .env}
      # ── Epic Games OAuth client (override built-in Switch client if needed) ──
      - EPIC_CLIENT_ID=${EPIC_CLIENT_ID:-}
      - EPIC_CLIENT_SECRET=${EPIC_CLIENT_SECRET:-}
      # ── Leaderboard page cap (100 entries/page, default 100 pages = top 10K) ──
      - Scraper__MaxPagesPerLeaderboard=${MAX_PAGES_PER_LEADERBOARD:-100}
      # ── Sequential scrape: one song at a time, ~6×PageConcurrency concurrent requests (default: false) ──
      - Scraper__SequentialScrape=${SEQUENTIAL_SCRAPE:-false}
      # ── Pages fetched concurrently per instrument in sequential mode (default: 10 = ~60 concurrent) ──
      - Scraper__PageConcurrency=${PAGE_CONCURRENCY:-10}
      # ── Songs scraped concurrently in sequential mode (default: 1) ──
      - Scraper__SongConcurrency=${SONG_CONCURRENCY:-1}
      # ── Hard cap on API requests per second, 0 = unlimited (default: 0) ──
      - Scraper__MaxRequestsPerSecond=${MAX_REQUESTS_PER_SECOND:-0}
      # ── Initial DOP: start low and ramp via AIMD slow-start to avoid CDN burst blocks (default: 4) ──
      - Scraper__InitialDop=${INITIAL_DOP:-4}
      # ── Path generation (MIDI decryption key for CHOpt max score calculation) ──
      - Scraper__MidiEncryptionKey=${MIDI_ENCRYPTION_KEY:-}
      # ── Feature flags (default: all OFF in production) ──
      - Features__Rivals=${FEATURE_RIVALS:-false}
      - Features__Leaderboards=${FEATURE_LEADERBOARDS:-false}
      - Features__FirstRun=${FEATURE_FIRST_RUN:-false}
      - Features__PlayerBands=${FEATURE_PLAYER_BANDS:-false}
      # Set to true to disable background scraping (API-only mode)
      # - Scraper__ApiOnly=true
      # Override scraper settings via environment variables if needed:
      # - Scraper__ScrapeInterval=04:00:00
      # - Scraper__SongSyncInterval=00:15:00
      # - Scraper__DegreeOfParallelism=16
      # - Scraper__ScrapePassTimeoutMinutes=45
      # ── Proxy rotation + VPN city cycling ──
      # Active when using gluetun proxy containers (docker compose --profile vpn up -d).
      # Each proxy needs a unique WireGuard identity (separate AirVPN device key).
      - Scraper__ProxyUrls__0=http://gluetun-1:8888
      - Scraper__ProxyUrls__1=http://gluetun-2:8888
      - Scraper__ProxyUrls__2=http://gluetun-3:8888
      - Scraper__ProxyUrls__3=http://gluetun-4:8888
      - Scraper__ControlUrls__0=http://gluetun-1:8000
      - Scraper__ControlUrls__1=http://gluetun-2:8000
      - Scraper__ControlUrls__2=http://gluetun-3:8000
      - Scraper__ControlUrls__3=http://gluetun-4:8000
      # ── Container names for Docker-based VPN recycling ──
      # When set, FSTService recreates gluetun containers (stop/rm/run) via the
      # Docker Engine API instead of using the gluetun control API. More reliable
      # when gluetun is crash-looping or WireGuard is wedged.
      - Scraper__ContainerNames__0=gluetun-1
      - Scraper__ContainerNames__1=gluetun-2
      - Scraper__ContainerNames__2=gluetun-3
      - Scraper__ContainerNames__3=gluetun-4
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  festivalweb:
    image: ghcr.io/sfenton/fstfestivalweb:latest
    container_name: festivalweb
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:80"
    environment:
      - API_BACKEND_URL=http://fstservice:8080
    depends_on:
      fstservice:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── VPN Proxy Containers ─────────────────────────────────
  # Activate with: docker compose --profile vpn up -d
  # Each container needs a unique WireGuard device key from your VPN provider.
  # The scraper rotates requests across proxies and cycles VPN cities on CDN blocks.
  #
  # Required .env variables per instance:
  #   GLUETUN_{N}_WG_PRIVATE_KEY, GLUETUN_{N}_WG_PRESHARED_KEY, GLUETUN_{N}_WG_ADDRESS
  # Shared:
  #   AIRVPN_WG_PUBLIC_KEY (default provided below)

  gluetun-1:
    image: qmcgaw/gluetun
    container_name: gluetun-1
    profiles: [vpn]
    cap_add: [NET_ADMIN]
    devices: [/dev/net/tun]
    environment:
      - HTTPPROXY=on
      - VPN_SERVICE_PROVIDER=airvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${GLUETUN_1_WG_PRIVATE_KEY}
      - WIREGUARD_PRESHARED_KEY=${GLUETUN_1_WG_PRESHARED_KEY}
      - WIREGUARD_ADDRESSES=${GLUETUN_1_WG_ADDRESS}
      - WIREGUARD_PUBLIC_KEY=${AIRVPN_WG_PUBLIC_KEY:-PyLCXAQT8KkM4T+dUsOQfn+Ub3pGxfGlxkIApuig+hk=}
      - SERVER_CITIES=${GLUETUN_1_CITY:-Los Angeles}
      - WIREGUARD_MTU=1320
      - UPDATER_PERIOD=24h
      - FIREWALL_OUTBOUND_SUBNETS=172.16.0.0/12
      - HTTP_CONTROL_SERVER_AUTH_DEFAULT_ROLE={"auth":"none"}
    restart: unless-stopped
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/v1/vpn/status"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  gluetun-2:
    image: qmcgaw/gluetun
    container_name: gluetun-2
    profiles: [vpn]
    cap_add: [NET_ADMIN]
    devices: [/dev/net/tun]
    environment:
      - HTTPPROXY=on
      - VPN_SERVICE_PROVIDER=airvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${GLUETUN_2_WG_PRIVATE_KEY}
      - WIREGUARD_PRESHARED_KEY=${GLUETUN_2_WG_PRESHARED_KEY}
      - WIREGUARD_ADDRESSES=${GLUETUN_2_WG_ADDRESS}
      - WIREGUARD_PUBLIC_KEY=${AIRVPN_WG_PUBLIC_KEY:-PyLCXAQT8KkM4T+dUsOQfn+Ub3pGxfGlxkIApuig+hk=}
      - SERVER_CITIES=${GLUETUN_2_CITY:-New York City}
      - WIREGUARD_MTU=1320
      - UPDATER_PERIOD=24h
      - FIREWALL_OUTBOUND_SUBNETS=172.16.0.0/12
      - HTTP_CONTROL_SERVER_AUTH_DEFAULT_ROLE={"auth":"none"}
    restart: unless-stopped
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/v1/vpn/status"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  gluetun-3:
    image: qmcgaw/gluetun
    container_name: gluetun-3
    profiles: [vpn]
    cap_add: [NET_ADMIN]
